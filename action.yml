name: "uv release tools"
description: "Validate uv version bumps against PR labels; tag (and optionally release) from pyproject.toml"

inputs:
  mode:
    description: "validate | tag"
    required: true

  pyproject_path:
    description: "Path to pyproject.toml"
    required: false
    default: "pyproject.toml"

  release_label_prefix:
    description: "PR label prefix used to determine bump type (e.g., release:)"
    required: false
    default: "release:"

  tag_prefix:
    description: "Tag prefix (e.g., v -> v1.2.3)"
    required: false
    default: "v"

outputs:
  # Common
  version:
    description: "Version read from pyproject.toml (head for validate, current checkout for tag)"
    value: ${{ steps.out.outputs.version }}

  # Validate-mode outputs
  valid:
    description: "true|false - whether validate mode passed"
    value: ${{ steps.out.outputs.valid }}
  expected_bump:
    description: "patch|minor|major - derived from PR label"
    value: ${{ steps.out.outputs.expected_bump }}
  actual_bump:
    description: "patch|minor|major - derived from version delta"
    value: ${{ steps.out.outputs.actual_bump }}

  # Tag-mode outputs
  tag:
    description: "The tag name that was created or found (e.g., v1.2.3)"
    value: ${{ steps.out.outputs.tag }}
  created_tag:
    description: "true|false - whether a new tag was created"
    value: ${{ steps.out.outputs.created_tag }}
  created_release:
    description: "true|false - whether a GitHub Release was created"
    value: ${{ steps.out.outputs.created_release }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # Validate mode (PR)
    - name: Validate release label vs version bump
      id: validate
      if: ${{ inputs.mode == 'validate' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PYPROJECT_PATH: ${{ inputs.pyproject_path }}
        RELEASE_LABEL_PREFIX: ${{ inputs.release_label_prefix }}
      run: |
        python "${{ github.action_path }}/scripts/validate_version.py"
