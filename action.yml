name: "uv release tools"
description: "Validate release labels on PRs; automatically bump versions and create tags on merge"

inputs:
  mode:
    description: "validate | release"
    required: true

  pyproject_path:
    description: "Path to pyproject.toml"
    required: false
    default: "pyproject.toml"

  release_label_prefix:
    description: "PR label prefix used to determine bump type (e.g., release:)"
    required: false
    default: "release:"

  tag_prefix:
    description: "Tag prefix (e.g., v -> v1.2.3)"
    required: false
    default: "v"

outputs:
  # Validate-mode outputs
  valid:
    description: "true|false - whether exactly one valid release label exists"
    value: ${{ steps.validate.outputs.valid }}
  release_type:
    description: "patch|minor|major - release type from PR label, or empty if no label"
    value: ${{ steps.validate.outputs.release_type }}

  # Release-mode outputs (to be implemented)
  version:
    description: "New version after bump"
    value: ${{ steps.release.outputs.version }}
  previous_version:
    description: "Version before bump"
    value: ${{ steps.release.outputs.previous_version }}
  tag:
    description: "The tag name that was created or found (e.g., v1.2.3)"
    value: ${{ steps.release.outputs.tag }}
  created_tag:
    description: "true|false - whether a new tag was created"
    value: ${{ steps.release.outputs.created_tag }}
  created_release:
    description: "true|false - whether a GitHub Release was created"
    value: ${{ steps.release.outputs.created_release }}
  committed:
    description: "true|false - whether version was committed"
    value: ${{ steps.release.outputs.committed }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # Validate mode (PR)
    - name: Validate release labels
      id: validate
      if: ${{ inputs.mode == 'validate' }}
      shell: bash
      env:
        RELEASE_LABEL_PREFIX: ${{ inputs.release_label_prefix }}
      run: |
        python "${{ github.action_path }}/scripts/validate_version.py"
