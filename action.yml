name: "uv release tools"
description: "Validate release labels on PRs; automatically bump versions and create tags on merge"

inputs:
  pyproject_path:
    description: "Path to pyproject.toml"
    required: false
    default: "pyproject.toml"

  release_label_prefix:
    description: "PR label prefix used to determine bump type (e.g., release:)"
    required: false
    default: "release:"

  tag_prefix:
    description: "Tag prefix (e.g., v -> v1.2.3)"
    required: false
    default: "v"

  commit_message:
    description: "Commit message template (supports {version}, {release_type})"
    required: false
    default: "Release {tag_prefix}{version}"

  default_branch:
    description: "Default branch name (fallback if auto-detection fails)"
    required: false
    default: "main"

outputs:
  # Validation outputs (when PR is open/updated)
  valid:
    description: "true|false - whether exactly one valid release label exists"
    value: ${{ steps.action.outputs.valid }}

  release_type:
    description: "patch|minor|major - release type from PR label, or empty if no label"
    value: ${{ steps.action.outputs.release_type }}


  # Release outputs (when PR is merged)
  version:
    description: "New version after bump"
    value: ${{ steps.action.outputs.version }}

  previous_version:
    description: "Version before bump"
    value: ${{ steps.action.outputs.previous_version }}

  tag:
    description: "The tag name that was created or found (e.g., v1.2.3)"
    value: ${{ steps.action.outputs.tag }}

  created_tag:
    description: "true|false - whether a new tag was created"
    value: ${{ steps.action.outputs.created_tag }}

  committed:
    description: "true|false - whether version was committed"
    value: ${{ steps.action.outputs.committed }}


runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Validate labels or create release
      id: action
      shell: bash
      env:
        PYPROJECT_PATH: ${{ inputs.pyproject_path }}
        RELEASE_LABEL_PREFIX: ${{ inputs.release_label_prefix }}
        TAG_PREFIX: ${{ inputs.tag_prefix }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
        DEFAULT_BRANCH: ${{ inputs.default_branch }}
      run: |
        python "${{ github.action_path }}/scripts/main.py"
